services:
  server:
    build:
      context: ..
      dockerfile: sellerclaw-agent/runtime/Dockerfile
      target: staging
    ports:
      - "127.0.0.1:8001:8001"
      - "${OPENCLAW_PORT_GATEWAY:-7788}:7788"
      - "${OPENCLAW_PORT_VNC:-6080}:6080"
    volumes:
      - ./data:/data
      - sellerclaw-config-bundle:/opt/config-bundle
    environment:
      SELLERCLAW_DATA_DIR: /data
      SELLERCLAW_API_URL: "${SELLERCLAW_API_URL:-http://host.docker.internal:8000}"
      SELLERCLAW_WEB_URL: "${SELLERCLAW_WEB_URL:-http://localhost:5173}"
      ADMIN_URL: "${ADMIN_URL:-http://localhost:5174}"
      AGENT_API_KEY: "${AGENT_API_KEY:-}"
      SELLERCLAW_LOCAL_API_KEY: "${SELLERCLAW_LOCAL_API_KEY:-}"
      SELLERCLAW_EDGE_PING: "${SELLERCLAW_EDGE_PING:-1}"
      OPENCLAW_BUNDLE_VOLUME_PATH: /opt/config-bundle
      OPENCLAW_GATEWAY_HTTP_BASE: "${OPENCLAW_GATEWAY_HTTP_BASE:-http://127.0.0.1:7789}"
      OPENCLAW_PORT_GATEWAY: "${OPENCLAW_PORT_GATEWAY:-7788}"
      OPENCLAW_PORT_VNC: "${OPENCLAW_PORT_VNC:-6080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.admin-ui
    ports:
      - "5174:5174"
    volumes:
      - ./admin-ui:/app
      - admin_ui_node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  admin_ui_node_modules:
  sellerclaw-config-bundle:
    name: sellerclaw-config-bundle
