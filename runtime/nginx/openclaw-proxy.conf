worker_processes 1;
daemon off;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_body_temp_path /tmp/nginx/body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;

    access_log /tmp/nginx/access.log;
    error_log /tmp/nginx/error.log warn;

    # OpenClaw gateway (Control UI + API).
    server {
        listen 7788;
        listen [::]:7788;
        server_name _;

        location /internal/browser-status {
            proxy_pass http://127.0.0.1:7800/json/list;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:7800;
            proxy_set_header Connection close;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
            error_page 502 504 = @browser_inactive;
        }

        location @browser_inactive {
            default_type application/json;
            return 200 '[]';
        }

        location / {
            proxy_pass http://127.0.0.1:7789;
            proxy_http_version 1.1;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_set_header X-Forwarded-For 127.0.0.1;
            proxy_set_header X-Real-IP 127.0.0.1;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # KasmVNC auth proxy -- injects Basic Auth so iframes load without a
    # credentials prompt. The ${VNC_AUTH_BASIC} placeholder is replaced by
    # envsubst at container startup (see openclaw_start).
    server {
        listen 6081;
        listen [::]:6081;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:6080;
            proxy_http_version 1.1;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_buffering off;

            proxy_set_header Authorization "${VNC_AUTH_BASIC}";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_hide_header Cross-Origin-Embedder-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
        }
    }
}
