name: Build Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the image (without leading v)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Extract version and image name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ -z "$version" ]]; then
            echo "Version must be non-empty" >&2
            exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "Building version: ${version}"
          echo "Image: ${image}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

  build:
    name: Build server image
    needs: [resolve]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (into sellerclaw-agent/)
        uses: actions/checkout@v5
        with:
          path: sellerclaw-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: sellerclaw-agent/runtime/Dockerfile
          target: staging
          push: true
          tags: |
            ${{ needs.resolve.outputs.image }}:${{ needs.resolve.outputs.version }}
            ${{ needs.resolve.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}
          cache-from: type=registry,ref=${{ needs.resolve.outputs.image }}:cache
          cache-to: type=registry,ref=${{ needs.resolve.outputs.image }}:cache,mode=max
